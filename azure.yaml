# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: sitecore-azure-ai-search-accelerator
metadata:
  template: sitecore-azure-ai-search-accelerator@0.1.0

# This template provisions infrastructure only (no app host). After provisioning,
# the postprovision hook configures the search indexes, loads the sample dataset,
# and runs the before/after relevance evaluation.
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/postprovision.ps1
      interactive: true
      continueOnError: false
    posix:
      shell: sh
      run: ./scripts/postprovision.sh
      interactive: true
      continueOnError: false
